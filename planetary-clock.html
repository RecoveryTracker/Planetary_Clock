<!DOCTYPE html>
<html>
<head>
  <title>Planetary Clock</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f8f8f8; text-align: center; margin: 0; padding: 20px; }
    h1 { margin-bottom: 10px; }
    .controls { margin: 20px 0; }
    input, button { padding: 10px; font-size: 16px; margin: 5px; }
    canvas { background: white; border: 4px solid #222; border-radius: 50%; box-shadow: 0 6px 25px rgba(0,0,0,0.2); }
  </style>
</head>
<body>
  <h1>Planetary Clock</h1>
  
  <div class="controls">
    <input type="date" id="dateInput" value="2026-04-12">
    <input type="time" id="timeInput" value="10:00">
    <button onclick="setToNow()">Now</button>
    <button onclick="updateChart()">Update Chart</button>
  </div>

  <canvas id="chart" width="640" height="640"></canvas>

  <script type="module">
    import SwissEph from 'https://cdn.jsdelivr.net/gh/prolaxu/swisseph-wasm@main/src/swisseph.js';

    const planets = [
      { name: 'Sun',     id: 0, color: '#ffeb3b' },
      { name: 'Moon',    id: 1, color: '#e0e0e0' },
      { name: 'Mercury', id: 2, color: '#9e9e9e' },
      { name: 'Venus',   id: 3, color: '#ff9800' },
      { name: 'Mars',    id: 4, color: '#f44336' },
      { name: 'Jupiter', id: 5, color: '#4caf50' },
      { name: 'Saturn',  id: 6, color: '#ffeb3b' }
    ];

    const OMAK_LON = -119.53;
    const OMAK_LAT = 48.41;

    async function updateChart() {
      const dateStr = document.getElementById('dateInput').value;
      const timeStr = document.getElementById('timeInput').value || "10:00";

      const d = new Date(`${dateStr}T${timeStr}`);
      const year = d.getFullYear();
      const month = d.getMonth() + 1;
      const day = d.getDate();
      const hour = d.getHours() + d.getMinutes() / 60;

      const swe = new SwissEph();
      await swe.initSwissEph();

      const jd = swe.julday(year, month, day, hour);
      const geopos = [OMAK_LON, OMAK_LAT, 0];

      const canvas = document.getElementById('chart');
      const ctx = canvas.getContext('2d');
      const cx = 320, cy = 320, radius = 280;

      // White background + circles
      ctx.fillStyle = 'white';
      ctx.fillRect(0, 0, 640, 640);

      ctx.strokeStyle = '#222';
      ctx.lineWidth = 5;
      ctx.beginPath(); ctx.arc(cx, cy, radius, 0, Math.PI * 2); ctx.stroke();   // outer

      ctx.lineWidth = 2;
      ctx.strokeStyle = '#666';
      ctx.beginPath(); ctx.moveTo(cx - radius, cy); ctx.lineTo(cx + radius, cy); ctx.stroke(); // horizon

      for (const p of planets) {
        const pos = swe.calc_ut(jd, p.id, swe.SEFLG_SWIEPH);
        const xaz = swe.azalt(jd, swe.SE_ECL2HOR, geopos, 0, 15, pos);

        const azimuth = xaz.azimuth !== undefined ? xaz.azimuth : (xaz[0] || 0);
        const altitude = xaz.apparentAltitude !== undefined ? xaz.apparentAltitude : (xaz[2] || xaz[1] || 0);

        // Position: azimuth for angle, altitude for distance from center
        const dist = radius * (90 - Math.max(-10, Math.min(90, altitude))) / 180;
        const rad = (azimuth * Math.PI) / 180;
        const x = cx + dist * Math.sin(rad);
        const y = cy - dist * Math.cos(rad);   // North = top

        // Planet dot
        ctx.fillStyle = p.color;
        ctx.shadowBlur = 18;
        ctx.shadowColor = p.color;
        ctx.beginPath();
        ctx.arc(x, y, 12, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;

        // Label
        ctx.fillStyle = '#111';
        ctx.font = 'bold 15px Arial';
        ctx.textAlign = 'left';
        ctx.fillText(p.name, x + 20, y + 6);
      }

      swe.close();
    }

    function setToNow() {
      const now = new Date();
      document.getElementById('dateInput').value = now.toISOString().slice(0, 10);
      document.getElementById('timeInput').value = now.getHours().toString().padStart(2, '0') + ':' + 
                                                   now.getMinutes().toString().padStart(2, '0');
      updateChart();
    }

    // Initial draw
    window.onload = () => {
      updateChart();
    };
  </script>
</body>
</html>
